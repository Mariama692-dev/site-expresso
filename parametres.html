<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Paramètres | Expresso</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
:root{--primary:#a30be9;}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',Arial,sans-serif;}
body{background:#f8f9fa;}
.container{width:90%;max-width:1300px;margin:auto;}
header{background:var(--primary);padding:15px 0;}
.logo-text{color:#fff;font-size:28px;font-weight:700;text-decoration:none;}
.compte-page .account-wrapper{padding:60px 0;min-height:70vh;}
.compte-page .account-grid{display:grid;grid-template-columns:280px 1fr;gap:40px;}
.compte-page .account-sidebar{background:#fff;border-radius:15px;padding:30px;box-shadow:0 5px 15px rgba(0,0,0,0.08);}
.compte-page .account-nav{display:flex;flex-direction:column;gap:8px;}
.compte-page .account-nav a{padding:12px 15px;border-radius:10px;color:#666;text-decoration:none;display:flex;align-items:center;gap:12px;}
.compte-page .account-nav a:hover,.compte-page .account-nav a.active{background:#a30be9;color:#fff;}
.settings-form{background:#fff;padding:30px;border-radius:15px;box-shadow:0 3px 10px rgba(0,0,0,0.08);}
.settings-form h3{margin-bottom:20px;}
.settings-form input{width:100%;padding:12px 15px;margin-bottom:15px;border:2px solid #e0e0e0;border-radius:10px;}
.settings-form button{padding:12px 25px;background:var(--primary);color:#fff;border:none;border-radius:10px;cursor:pointer;}
@media(max-width:992px){.compte-page .account-grid{grid-template-columns:1fr;}}
</style>
</head>
<body class="compte-page">
<header><div class="container"><a href="index.html" class="logo-text">expresso</a></div></header>

<section class="account-wrapper">
<div class="container">
<div class="account-grid">
<aside class="account-sidebar">
<nav class="account-nav">
<a href="compte.html"><i class="fas fa-home"></i> Tableau de bord</a>
<a href="mes-lignes.html"><i class="fas fa-sim-card"></i> Mes lignes</a>
<a href="factures.html"><i class="fas fa-file-invoice"></i> Factures</a>
<a href="historique.html"><i class="fas fa-history"></i> Historique</a>
<a href="parametres.html" class="active"><i class="fas fa-cog"></i> Paramètres</a>
</nav>
</aside>

<div class="account-content">
<h2>Paramètres du compte</h2>
<form class="settings-form">
<h3>Informations personnelles</h3>
<input type="text" placeholder="Nom complet" value="Moussa Diallo">
<input type="email" placeholder="Email" value="moussa@email.com">
<input type="tel" placeholder="Téléphone" value="+221 77 123 45 67">
<h3>Changer mot de passe</h3>
<input type="password" placeholder="Ancien mot de passe">
<input type="password" placeholder="Nouveau mot de passe">
<button type="submit">Enregistrer</button>
</form>
</div>
</div>
</div>
</section>
</body>
</html>
