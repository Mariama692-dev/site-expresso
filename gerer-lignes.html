<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gérer la ligne | Expresso</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
/* CSS SCOPED COMPTE */
:root{--primary:#a30be9;--accent:#ff6600;--dark:#222;--gray:#666;}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',Arial,sans-serif;}
body{background:#f8f9fa;color:var(--dark);}
.container{width:90%;max-width:1300px;margin:auto;}
header{background:var(--primary);padding:15px 0;position:sticky;top:0;z-index:1000;}
header .container{display:flex;justify-content:space-between;align-items:center;}
.logo-text{color:#fff;font-size:28px;font-weight:700;text-decoration:none;}
nav{display:flex;gap:20px;}
nav a{color:#fff;font-weight:600;text-decoration:none;}

.compte-page .account-wrapper{padding:60px 0;min-height:70vh;}
.compte-page .account-grid{display:grid;grid-template-columns:280px 1fr;gap:40px;}
.compte-page .account-sidebar{background:#fff;border-radius:15px;padding:30px;box-shadow:0 5px 15px rgba(0,0,0,0.08);}
.compte-page .user-info{text-align:center;padding-bottom:25px;border-bottom:1px solid #e0e0e0;margin-bottom:25px;}
.compte-page .avatar{width:80px;height:80px;border-radius:50%;background:linear-gradient(135deg,#a30be9,#7b06b0);display:flex;align-items:center;justify-content:center;margin:0 auto 15px;font-size:35px;color:#fff;}
.compte-page .account-nav{display:flex;flex-direction:column;gap:8px;}
.compte-page .account-nav a{padding:12px 15px;border-radius:10px;color:#666;text-decoration:none;display:flex;align-items:center;gap:12px;transition:0.3s;}
.compte-page .account-nav a:hover,.compte-page .account-nav a.active{background:#a30be9;color:#fff;}

.compte-page .account-content h2{font-size:28px;margin-bottom:30px;}

.manage-card{background:#fff;padding:30px;border-radius:15px;box-shadow:0 3px 10px rgba(0,0,0,0.08);margin-bottom:20px;}
.manage-card h3{margin-bottom:15px;font-size:22px;}
.manage-card p{color:var(--gray);margin-bottom:10px;}
.info-row{display:flex;justify-content:space-between;padding:12px 0;border-bottom:1px solid #f0f0f0;}
.info-row:last-child{border-bottom:none;}
.btn-group{display:flex;gap:15px;margin-top:25px;flex-wrap:wrap;}
.btn-primary{padding:12px 25px;background:var(--primary);color:#fff;border:none;border-radius:10px;cursor:pointer;font-weight:600;transition:0.3s;}
.btn-primary:hover{background:#8a09c7;}
.btn-secondary{padding:12px 25px;background:#fff;color:var(--primary);border:2px solid var(--primary);border-radius:10px;cursor:pointer;font-weight:600;transition:0.3s;}
.btn-secondary:hover{background:#f8f4ff;}

@media(max-width:992px){.compte-page .account-grid{grid-template-columns:1fr;}}
@media(max-width:600px){.btn-group{flex-direction:column;}}
</style>
</head>
<body class="compte-page">

<header>
<div class="container">
<a href="index.html" class="logo-text">expresso</a>
<nav><a href="compte.html">Mon Compte</a></nav>
</div>
</header>

<section class="account-wrapper">
<div class="container">
<div class="account-grid">

<aside class="account-sidebar">
<div class="user-info">
<div class="avatar"><i class="fas fa-user"></i></div>
<h3>Moussa Diallo</h3>
<p>+221 77 123 45 67</p>
</div>
<nav class="account-nav">
<a href="compte.html"><i class="fas fa-home"></i> Tableau de bord</a>
<a href="mes-lignes.html" class="active"><i class="fas fa-sim-card"></i> Mes lignes</a>
<a href="factures.html"><i class="fas fa-file-invoice"></i> Factures</a>
<a href="historique.html"><i class="fas fa-history"></i> Historique</a>
<a href="parametres.html"><i class="fas fa-cog"></i> Paramètres</a>
</nav>
</aside>

<div class="account-content">
<h2>Gérer la ligne</h2>

<div class="manage-card">
<h3>+221 77 123 45 67</h3>
<div class="info-row">
<span>Statut</span>
<span style="color:#28a745;font-weight:600;">Active</span>
</div>
<div class="info-row">
<span>Forfait actuel</span>
<span>Illimix 10GB</span>
</div>
<div class="info-row">
<span>Data restante</span>
<span>8.2 GB</span>
</div>
<div class="info-row">
<span>Expiration</span>
<span>25 Oct 2026</span>
</div>

<div class="btn-group">
<button class="btn-primary" onclick="alert('Renouveler le forfait')">Renouveler le forfait</button>
<button class="btn-secondary" onclick="alert('Changer de forfait')">Changer de forfait</button>
<button class="btn-secondary" onclick="alert('Suspendre la ligne')">Suspendre</button>
</div>
</div>

<button class="btn-secondary" onclick="window.location.href='mes-lignes.html'">
<i class="fas fa-arrow-left"></i> Retour aux lignes
</button>

</div>
</div>
</div>
</section>

</body>
</html>
