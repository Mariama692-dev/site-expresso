<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Factures | Expresso</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
:root{--primary:#a30be9;--gray:#666;}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',Arial,sans-serif;}
body{background:#f8f9fa;color:#222;}
.container{width:90%;max-width:1300px;margin:auto;}
header{background:var(--primary);padding:15px 0;}
header .container{display:flex;justify-content:space-between;align-items:center;}
.logo-text{color:#fff;font-size:28px;font-weight:700;text-decoration:none;}
.compte-page .account-wrapper{padding:60px 0;min-height:70vh;}
.compte-page .account-grid{display:grid;grid-template-columns:280px 1fr;gap:40px;}
.compte-page .account-sidebar{background:#fff;border-radius:15px;padding:30px;box-shadow:0 5px 15px rgba(0,0,0,0.08);}
.compte-page .avatar{width:80px;height:80px;border-radius:50%;background:linear-gradient(135deg,#a30be9,#7b06b0);display:flex;align-items:center;justify-content:center;margin:0 auto 15px;font-size:35px;color:#fff;}
.compte-page .account-nav{display:flex;flex-direction:column;gap:8px;}
.compte-page .account-nav a{padding:12px 15px;border-radius:10px;color:#666;text-decoration:none;display:flex;align-items:center;gap:12px;}
.compte-page .account-nav a:hover,.compte-page .account-nav a.active{background:#a30be9;color:#fff;}
.facture-table{width:100%;background:#fff;border-radius:15px;overflow:hidden;box-shadow:0 3px 10px rgba(0,0,0,0.08);}
.facture-table th,.facture-table td{padding:15px;text-align:left;border-bottom:1px solid #f0f0f0;}
.facture-table th{background:#f8f9fa;font-weight:600;}
.facture-table button{padding:8px 15px;background:var(--primary);color:#fff;border:none;border-radius:8px;cursor:pointer;}
@media(max-width:992px){.compte-page .account-grid{grid-template-columns:1fr;}}
</style>
</head>
<body class="compte-page">
<header><div class="container"><a href="index.html" class="logo-text">expresso</a></div></header>

<section class="account-wrapper">
<div class="container">
<div class="account-grid">
<aside class="account-sidebar">
<div class="avatar"><i class="fas fa-user"></i></div>
<nav class="account-nav">
<a href="compte.html"><i class="fas fa-home"></i> Tableau de bord</a>
<a href="mes-lignes.html"><i class="fas fa-sim-card"></i> Mes lignes</a>
<a href="factures.html" class="active"><i class="fas fa-file-invoice"></i> Factures</a>
<a href="historique.html"><i class="fas fa-history"></i> Historique</a>
<a href="parametres.html"><i class="fas fa-cog"></i> Paramètres</a>
</nav>
</aside>

<div class="account-content">
<h2>Mes Factures</h2>
<table class="facture-table">
<tr><th>Mois</th><th>Montant</th><th>Statut</th><th>Action</th></tr>
<tr><td>Octobre 2026</td><td>5 000 FCFA</td><td style="color:#28a745;">Payée</td><td><button>Télécharger PDF</button></td></tr>
<tr><td>Septembre 2026</td><td>5 000 FCFA</td><td style="color:#28a745;">Payée</td><td><button>Télécharger PDF</button></td></tr>
<tr><td>Août 2026</td><td>7 500 FCFA</td><td style="color:#dc3545;">Impayée</td><td><button>Payer</button></td></tr>
</table>
</div>
</div>
</div>
</section>
</body>
</html>
